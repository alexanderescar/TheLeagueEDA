<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The League</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --field: #090f0b;
  --turf: #0d1a11;
  --line: #162a1d;
  --chalk: #e8f4ec;
  --chalk-dim: #a8c4b0;
  --gold: #f0c040;
  --gold-dim: rgba(240,192,64,0.15);
  --red: #e05555;
  --green: #3dbb6a;
  --muted: #456055;
  --card: #0f1c14;
  --border: #1b3324;
  --border-bright: #2a4d38;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--field);
  color: var(--chalk);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* Subtle yard-line texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    180deg,
    transparent, transparent 79px,
    rgba(255,255,255,0.025) 79px, rgba(255,255,255,0.025) 80px
  );
  pointer-events: none;
  z-index: 0;
}

#app { position: relative; z-index: 1; }

/* ─── HEADER ─── */
header {
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  background: rgba(9,15,11,0.97);
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  height: 64px;
  gap: 0;
}

.header-brand {
  display: flex;
  flex-direction: column;
  justify-content: center;
  flex: 1;
}

.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 3px;
  color: var(--gold);
  line-height: 1;
}

.header-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.season-select {
  background: var(--line);
  border: 1px solid var(--border-bright);
  color: var(--chalk);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  outline: none;
}

.season-select:focus { border-color: var(--gold); }

.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--line);
  border: 1px solid var(--border);
  padding: 5px 10px;
  border-radius: 20px;
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}
.dot.live { background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse 2s infinite; }
.dot.err  { background: var(--red); }

@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* ─── NAV ─── */
nav {
  display: flex;
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  background: var(--turf);
  overflow-x: auto;
  scrollbar-width: none;
  gap: 0;
}
nav::-webkit-scrollbar { display: none; }

nav button {
  background: none; border: none;
  border-bottom: 3px solid transparent;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.8px;
  padding: 13px 22px;
  cursor: pointer;
  white-space: nowrap;
  text-transform: uppercase;
  transition: color 0.15s, border-color 0.15s;
  position: relative;
}
nav button:hover { color: var(--chalk-dim); }
nav button.active { color: var(--gold); border-bottom-color: var(--gold); }

/* History tab gets a special badge */
nav button.history-tab::after {
  content: 'FEATURED';
  position: absolute;
  top: 8px; right: 4px;
  font-size: 7px;
  background: var(--gold);
  color: var(--field);
  padding: 1px 4px;
  border-radius: 3px;
  letter-spacing: 0.5px;
  font-weight: 700;
}

/* ─── MAIN ─── */
main {
  padding: 28px 32px;
  max-width: 1120px;
}

.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeUp 0.2s ease; }

/* ─── CARDS ─── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 20px;
}

.card-header {
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}

.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px; letter-spacing: 1px;
  color: var(--gold);
}

.card-sub {
  font-size: 11px; color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

/* ─── STANDINGS ─── */
.std-table { width: 100%; border-collapse: collapse; }
.std-table th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 9px 16px; text-align: left;
  border-bottom: 1px solid var(--border);
}
.std-table td {
  padding: 11px 16px;
  border-bottom: 1px solid rgba(27,51,36,0.6);
  vertical-align: middle;
}
.std-table tr:last-child td { border-bottom: none; }
.std-table tr:hover td { background: rgba(255,255,255,0.018); }

.rank-n { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--muted); width:36px; }
.rank-n.top { color: var(--gold); }
.tm-name { font-weight:600; font-size:14px; }
.tm-owner { font-size:11px; color:var(--muted); margin-top:1px; }
.rec { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; }
.pf  { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--green); }
.pa  { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--muted); }

.streak {
  font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600;
  padding:3px 7px; border-radius:4px;
}
.streak-w { background:rgba(61,187,106,0.15); color:var(--green); }
.streak-l { background:rgba(224,85,85,0.15); color:var(--red); }

/* ─── POWER RANKINGS ─── */
.pr-item {
  display:flex; align-items:center; gap:14px;
  padding:13px 18px;
  border-bottom:1px solid rgba(27,51,36,0.5);
  transition:background 0.1s;
}
.pr-item:last-child { border-bottom:none; }
.pr-item:hover { background:rgba(255,255,255,0.018); }

.pr-num {
  font-family:'Bebas Neue',sans-serif; font-size:26px;
  width:34px; text-align:center; color:var(--muted); flex-shrink:0;
}
.pr-num.r1 { color:var(--gold); }
.pr-num.r2 { color:#b0b0b8; }
.pr-num.r3 { color:#b07840; }

.pr-info { flex:1; min-width:0; }
.pr-name { font-weight:600; font-size:14px; }
.pr-sub  { font-size:11px; color:var(--muted); margin-top:1px; }

.pr-bar-wrap { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; max-width:130px; }
.pr-bar { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--green),var(--gold)); transition:width 1s ease; }
.pr-score { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:var(--gold); width:48px; text-align:right; flex-shrink:0; }

/* ─── H2H ─── */
.h2h-wrap { overflow-x:auto; }
.h2h-tbl { border-collapse:collapse; font-size:12px; }
.h2h-tbl th, .h2h-tbl td {
  padding:8px 10px; text-align:center;
  border:1px solid var(--border); white-space:nowrap;
}
.h2h-tbl th { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); background:var(--turf); }
.h2h-tbl .rl { text-align:left; font-weight:600; background:var(--turf); font-size:12px; padding-right:14px; }
.h2h-win  { background:rgba(61,187,106,0.18); color:var(--green); font-weight:600; font-family:'JetBrains Mono',monospace; }
.h2h-loss { background:rgba(224,85,85,0.12); color:var(--red); font-family:'JetBrains Mono',monospace; }
.h2h-self { background:var(--line); color:var(--muted); }
.h2h-none { color:var(--border-bright); font-family:'JetBrains Mono',monospace; }

/* ─── SCORES ─── */
.wk-header {
  padding:9px 18px;
  background:var(--turf);
  border-bottom:1px solid var(--border);
  font-family:'Bebas Neue',sans-serif;
  font-size:15px; letter-spacing:1px; color:var(--chalk-dim);
}
.mu-row {
  display:flex; align-items:center; gap:8px;
  padding:10px 18px;
  border-bottom:1px solid rgba(27,51,36,0.4);
  transition:background 0.1s;
}
.mu-row:hover { background:rgba(255,255,255,0.018); }
.mu-team { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; }
.mu-team.w { font-weight:600; }
.mu-team.l { opacity:0.55; }
.mu-team.r { text-align:right; }
.mu-score { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; min-width:54px; text-align:right; flex-shrink:0; }
.mu-score.w { color:var(--green); }
.mu-score.l { color:var(--red); }
.mu-vs { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); flex-shrink:0; }

/* ─── AWARDS ─── */
.awards-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
  gap:14px; padding:16px;
}
.aw-card {
  background:var(--turf);
  border:1px solid var(--border);
  border-radius:8px; padding:15px;
  position:relative; overflow:hidden;
  transition:transform 0.15s, border-color 0.15s;
}
.aw-card:hover { transform:translateY(-2px); border-color:var(--border-bright); }
.aw-card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; }
.aw-card.gold::before   { background:var(--gold); }
.aw-card.green::before  { background:var(--green); }
.aw-card.red::before    { background:var(--red); }
.aw-card.silver::before { background:#808090; }
.aw-card.blue::before   { background:#4888e0; }
.aw-card.orange::before { background:#d07830; }
.aw-card.purple::before { background:#8858c8; }

.aw-emoji  { font-size:26px; margin-bottom:8px; }
.aw-title  { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:0.5px; color:var(--chalk); margin-bottom:3px; }
.aw-winner { font-weight:600; font-size:13px; color:var(--gold); margin-bottom:5px; }
.aw-desc   { font-size:11px; color:var(--muted); line-height:1.5; }

/* ═══════════════════════════════════════
   HISTORY — HERO FEATURE
═══════════════════════════════════════ */

.history-hero {
  background: linear-gradient(135deg, #0d1f14 0%, #111f16 50%, #0a180f 100%);
  border: 1px solid var(--border-bright);
  border-radius: 10px;
  padding: 24px 24px 20px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.history-hero::before {
  content: 'HISTORICAL STATS';
  position: absolute;
  top: 16px; right: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
}

.history-hero h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 4px;
}

.history-hero p {
  font-size: 13px; color: var(--muted);
  margin-bottom: 18px;
}

/* Controls row */
.hist-controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.ctrl-group { display:flex; flex-direction:column; gap:4px; }
.ctrl-label {
  font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:1px;
  color:var(--muted); text-transform:uppercase;
}

select.hist-sel, select.hist-multi {
  background: var(--field);
  border: 1px solid var(--border-bright);
  color: var(--chalk);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer; outline: none;
  min-width: 140px;
}
select.hist-sel:focus, select.hist-multi:focus { border-color: var(--gold); }

.ctrl-btn {
  background: var(--gold-dim);
  border: 1px solid rgba(240,192,64,0.3);
  color: var(--gold);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  letter-spacing: 0.5px;
  align-self: flex-end;
  transition: background 0.15s;
}
.ctrl-btn:hover { background: rgba(240,192,64,0.25); }

/* Season summary cards */
.season-summary-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.sscard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
}
.sscard-label {
  font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:1px;
  color:var(--muted); text-transform:uppercase;
  margin-bottom:6px;
}
.sscard-val {
  font-family:'Bebas Neue',sans-serif;
  font-size:28px; color:var(--gold);
  line-height:1;
}
.sscard-sub { font-size:11px; color:var(--muted); margin-top:3px; }

/* History table */
.hist-table-wrap { overflow-x:auto; }
.hist-table {
  width:100%; border-collapse:collapse;
  font-size:13px;
}
.hist-table th {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; color:var(--muted);
  text-transform:uppercase; letter-spacing:0.5px;
  padding:9px 14px; text-align:left;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
  cursor:pointer;
  user-select:none;
  transition:color 0.15s;
}
.hist-table th:hover { color:var(--chalk); }
.hist-table th.sort-asc::after  { content:' ▲'; color:var(--gold); font-size:9px; }
.hist-table th.sort-desc::after { content:' ▼'; color:var(--gold); font-size:9px; }

.hist-table td {
  padding:11px 14px;
  border-bottom:1px solid rgba(27,51,36,0.5);
  vertical-align:middle;
  white-space:nowrap;
}
.hist-table tr:last-child td { border-bottom:none; }
.hist-table tr:hover td { background:rgba(255,255,255,0.018); }

.hist-table td.num { font-family:'JetBrains Mono',monospace; }
.hist-table td.green-val { color:var(--green); font-family:'JetBrains Mono',monospace; font-weight:600; }
.hist-table td.red-val   { color:var(--red); font-family:'JetBrains Mono',monospace; }
.hist-table td.gold-val  { color:var(--gold); font-family:'JetBrains Mono',monospace; font-weight:600; }

.season-badge {
  display:inline-block;
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:600;
  padding:2px 7px; border-radius:4px;
  background:var(--gold-dim);
  color:var(--gold);
  border:1px solid rgba(240,192,64,0.2);
}

.champ-crown { color:var(--gold); margin-right:4px; }

/* Matchup browser */
.mu-browser-controls {
  display:flex; gap:10px; flex-wrap:wrap;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  background:var(--turf);
  align-items:flex-end;
}

/* All-time leaders */
.leaders-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px; padding:16px;
}
.leader-card {
  background:var(--turf);
  border:1px solid var(--border);
  border-radius:8px; padding:14px;
}
.leader-cat {
  font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:1px;
  color:var(--muted); text-transform:uppercase;
  margin-bottom:8px;
}
.leader-name { font-weight:700; font-size:14px; color:var(--chalk); margin-bottom:2px; }
.leader-val {
  font-family:'Bebas Neue',sans-serif;
  font-size:26px; color:var(--gold); line-height:1;
}
.leader-detail { font-size:11px; color:var(--muted); margin-top:3px; }

/* History sub-tabs */
.hist-tabs {
  display:flex; gap:0;
  border-bottom:1px solid var(--border);
  padding:0 18px;
  background:var(--turf);
  overflow-x:auto;
}
.hist-tab-btn {
  background:none; border:none;
  border-bottom:2px solid transparent;
  color:var(--muted);
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:600;
  padding:10px 16px; cursor:pointer;
  white-space:nowrap;
  text-transform:uppercase;
  letter-spacing:0.5px;
  transition:color 0.15s, border-color 0.15s;
}
.hist-tab-btn:hover { color:var(--chalk-dim); }
.hist-tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); }

.hist-sub { display:none; }
.hist-sub.active { display:block; animation:fadeUp 0.2s ease; }

/* ─── EMPTY / ERROR ─── */
.empty-msg {
  padding:48px; text-align:center; color:var(--muted);
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.empty-msg .eicon { font-size:38px; }
.empty-msg h3 { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--red); }
.empty-msg p { font-size:13px; line-height:1.7; max-width:480px; }
.empty-msg code {
  font-family:'JetBrains Mono',monospace;
  background:var(--line); padding:2px 6px;
  border-radius:3px; font-size:12px;
}

/* ─── RESPONSIVE ─── */
@media (max-width:720px) {
  main { padding:16px; }
  header { padding:0 16px; height:56px; }
  .header-title { font-size:24px; }
  nav { padding:0 16px; }
  .history-hero { padding:16px; }
  .history-hero h2 { font-size:22px; }
}

/* ─── DRAFT ─── */
.draft-controls {
  display:flex; gap:10px; flex-wrap:wrap;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  background:var(--turf);
  align-items:flex-end;
}

.pick-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px,1fr));
  gap:12px;
  padding:16px;
}

.pick-card {
  background:var(--turf);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px 14px;
  display:flex;
  gap:12px;
  align-items:flex-start;
  transition:border-color 0.15s;
}
.pick-card:hover { border-color:var(--border-bright); }

.pick-num {
  font-family:"Bebas Neue",sans-serif;
  font-size:22px;
  color:var(--muted);
  min-width:36px;
  line-height:1;
}
.pick-num.early { color:var(--gold); }
.pick-num.mid   { color:var(--chalk-dim); }

.pick-info { flex:1; min-width:0; }
.pick-player { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pick-team   { font-size:11px; color:var(--muted); margin-top:2px; }
.pick-owner  { font-size:11px; color:var(--gold); margin-top:3px; font-weight:600; }

.round-divider {
  padding:8px 18px;
  background:var(--turf);
  border-bottom:1px solid var(--border);
  font-family:"Bebas Neue",sans-serif;
  font-size:14px; letter-spacing:1px;
  color:var(--muted);
}

.draft-board-wrap { overflow-x:auto; padding:0; }
.draft-board {
  border-collapse:collapse;
  font-size:12px;
  min-width:600px;
}
.draft-board th {
  font-family:"JetBrains Mono",monospace;
  font-size:10px; color:var(--muted);
  text-transform:uppercase; letter-spacing:0.5px;
  padding:8px 12px;
  background:var(--turf);
  border:1px solid var(--border);
  white-space:nowrap;
}
.draft-board td {
  padding:8px 12px;
  border:1px solid rgba(27,51,36,0.5);
  vertical-align:top;
  min-width:120px;
  max-width:160px;
}
.draft-board td:first-child {
  background:var(--turf);
  font-family:"Bebas Neue",sans-serif;
  font-size:16px; color:var(--muted);
  text-align:center;
  min-width:50px;
}
.draft-board td .db-player { font-weight:600; font-size:12px; }
.draft-board td .db-pos    { font-size:10px; color:var(--muted); }
.draft-board td .db-team   { font-size:10px; color:var(--muted); }

.pos-qb  { color:#e88030; }
.pos-rb  { color:var(--green); }
.pos-wr  { color:#4888e0; }
.pos-te  { color:#a060d0; }
.pos-k   { color:var(--muted); }
.pos-dst { color:#d04040; }
.pos-def { color:#d04040; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-brand">
      <div class="header-title">The League</div>
      <div class="header-sub">Brought to you by EDA</div>
    </div>
    <div class="header-right">
      <select class="season-select" id="season-picker" onchange="onSeasonChange()">
        <option value="all">All Seasons</option>
      </select>
      <div class="status-pill" id="status-pill">
        <div class="spinner"></div>
        <span id="status-text">Loading...</span>
      </div>
    </div>
  </header>

  <nav>
    <button class="active" onclick="switchTab(event,'standings')">Standings</button>
    <button onclick="switchTab(event,'power')">Power Rankings</button>
    <button onclick="switchTab(event,'h2h')">Head-to-Head</button>
    <button onclick="switchTab(event,'scores')">Scores</button>
    <button onclick="switchTab(event,'awards')">Awards</button>
    <button class="history-tab" onclick="switchTab(event,'history')">History</button>
    <button onclick="switchTab(event,'draft')">Draft History</button>
  </nav>

  <main>
    <div id="tab-standings" class="tab-content active"></div>
    <div id="tab-power"     class="tab-content"></div>
    <div id="tab-h2h"       class="tab-content"></div>
    <div id="tab-scores"    class="tab-content"></div>
    <div id="tab-awards"    class="tab-content"></div>
    <div id="tab-history"   class="tab-content"></div>
    <div id="tab-draft"    class="tab-content"></div>
  </main>

</div>
<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let allSeasons = [];       // [{season, teams, schedule, settings, ...}]
let activeSeason = null;   // single season object or null = "all"
let teamsMap = {};         // {teamId: team} for active season
let sortCol = null, sortDir = 1;

// ══════════════════════════════════════════════
//  BOOTSTRAP
// ══════════════════════════════════════════════
async function loadData() {
  try {
    const res = await fetch('/api/league');
    const json = await res.json();

    if (!res.ok || json.error) {
      throw new Error(json.error || `HTTP ${res.status}`);
    }

    allSeasons = json.seasons || [];
    if (!allSeasons.length) throw new Error('No season data returned');

    // Populate season picker
    const picker = document.getElementById('season-picker');
    allSeasons.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.season;
      opt.textContent = `${s.season} Season`;
      picker.appendChild(opt);
    });

    // Default to most recent season
    activeSeason = allSeasons[0];
    picker.value = activeSeason.season;
    buildTeamsMap();

    setStatus('live', `${allSeasons.length} season${allSeasons.length>1?'s':''} loaded`);
    renderAll();

  } catch (err) {
    setStatus('err', 'Error');
    const html = errorHTML(err.message);
    ['standings','power','h2h','scores','awards','history','draft'].forEach(t => {
      document.getElementById('tab-' + t).innerHTML = html;
    });
  }
}

function onSeasonChange() {
  const val = document.getElementById('season-picker').value;
  activeSeason = val === 'all' ? null : allSeasons.find(s => String(s.season) === val);
  buildTeamsMap();
  renderAll();
}

function buildTeamsMap() {
  teamsMap = {};
  const src = activeSeason || allSeasons[0];
  if (src) src.teams.forEach(t => { teamsMap[t.id] = t; });
}

function renderAll() {
  renderStandings();
  renderPower();
  renderH2H();
  renderScores();
  renderAwards();
  renderHistory();
  renderDraft();
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function setStatus(state, text) {
  const pill = document.getElementById('status-pill');
  const dotCls = state === 'live' ? 'live' : state === 'err' ? 'err' : '';
  pill.innerHTML = `<div class="dot ${dotCls}"></div><span id="status-text">${text}</span>`;
}

function switchTab(e, name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  e.target.classList.add('active');
}

function tName(t) {
  return ((t.location||'') + ' ' + (t.nickname||'')).trim() || ('Team ' + t.id);
}
function oName(t) {
  if (!t.owners||!t.owners.length) return '';
  const o = t.owners[0];
  return o.firstName ? (o.firstName + ' ' + (o.lastName||'')).trim() : '';
}
function errorHTML(msg) {
  return `<div class="card"><div class="empty-msg">
    <div class="eicon">⚠️</div>
    <h3>Couldn't load data</h3>
    <p>${msg}<br><br>
    Check your Railway logs. If ESPN returns empty data, visit
    <code>/api/debug/2025</code> on your Railway URL to see the raw response.<br><br>
    For a private league, add <code>ESPN_S2</code> and <code>SWID</code> env vars in Railway.</p>
  </div></div>`;
}

// Get the schedule for current view (single season or most recent)
function getSchedule(season) {
  const src = season || activeSeason || allSeasons[0];
  return (src && src.schedule) ? src.schedule : [];
}

function getTeams(season) {
  const src = season || activeSeason || allSeasons[0];
  return (src && src.teams) ? src.teams : [];
}

function getTeamsMapFor(season) {
  const map = {};
  getTeams(season).forEach(t => { map[t.id] = t; });
  return map;
}

// ══════════════════════════════════════════════
//  STANDINGS
// ══════════════════════════════════════════════
function renderStandings() {
  const src = activeSeason || allSeasons[0];
  if (!src) { document.getElementById('tab-standings').innerHTML = errorHTML('No data'); return; }

  const teams = [...src.teams].sort((a,b) => {
    const wa = a.record?.overall?.wins ?? 0, wb = b.record?.overall?.wins ?? 0;
    if (wb !== wa) return wb - wa;
    return (b.points??0) - (a.points??0);
  });

  const week = src.status?.currentMatchupPeriod || src.scoringPeriodId || '?';

  let h = `<div class="card">
    <div class="card-header">
      <div class="card-title">League Standings</div>
      <div class="card-sub">${src.season} Season · Through Week ${week}</div>
    </div>
    <table class="std-table"><thead><tr>
      <th style="width:40px">#</th>
      <th>Team</th>
      <th>W–L</th>
      <th>PF</th>
      <th>PA</th>
      <th>Win %</th>
      <th>Streak</th>
    </tr></thead><tbody>`;

  teams.forEach((t,i) => {
    const rank = i+1;
    const rec = t.record?.overall || {};
    const w = rec.wins??0, l = rec.losses??0;
    const gp = w+l||1;
    const pct = (w/gp*100).toFixed(0);
    const pf = (t.points??0).toFixed(1);
    const pa = (t.pointsAgainst??0).toFixed(1);
    const st = t.record?.overall?.streak || {};
    const sType = (st.type||'').toUpperCase();
    const sLen = st.length||0;
    const streak = sLen
      ? `<span class="streak streak-${sType.toLowerCase()}">${sType}${sLen}</span>`
      : '<span style="color:var(--muted)">—</span>';

    h += `<tr>
      <td class="rank-n${rank<=3?' top':''}">${rank}</td>
      <td><div class="tm-name">${tName(t)}</div><div class="tm-owner">${oName(t)}</div></td>
      <td><span class="rec">${w}–${l}</span></td>
      <td><span class="pf">${pf}</span></td>
      <td><span class="pa">${pa}</span></td>
      <td><span class="num" style="color:var(--chalk-dim)">${pct}%</span></td>
      <td>${streak}</td>
    </tr>`;
  });

  h += '</tbody></table></div>';
  document.getElementById('tab-standings').innerHTML = h;
}

// ══════════════════════════════════════════════
//  POWER RANKINGS
// ══════════════════════════════════════════════
function renderPower() {
  const src = activeSeason || allSeasons[0];
  if (!src) return;

  const teams = src.teams.map(t => {
    const rec = t.record?.overall || {};
    const w = rec.wins??0, l = rec.losses??0;
    const gp = w+l||1;
    return { t, w, l, gp, pf: t.points??0, ppg: (t.points??0)/gp, wPct: w/gp };
  });

  const maxPPG = Math.max(...teams.map(x => x.ppg)) || 1;
  teams.forEach(x => { x.power = (x.ppg/maxPPG)*60 + x.wPct*40; });
  teams.sort((a,b) => b.power - a.power);
  const maxP = teams[0].power || 1;

  let h = `<div class="card">
    <div class="card-header">
      <div class="card-title">Power Rankings</div>
      <div class="card-sub">${src.season} · 60% PPG + 40% Win % — click a team for details</div>
    </div>`;

  teams.forEach((x,i) => {
    const r = i+1;
    const rc = r<=3 ? 'r'+r : '';
    const bar = (x.power/maxP*100).toFixed(1);
    h += `<div class="pr-item">
      <div class="pr-num ${rc}">${r}</div>
      <div class="pr-info">
        <div class="pr-name">${tName(x.t)}</div>
        <div class="pr-sub">${oName(x.t)} · ${x.w}–${x.l} · ${x.ppg.toFixed(1)} PPG</div>
      </div>
      <div class="pr-bar-wrap"><div class="pr-bar" style="width:${bar}%"></div></div>
      <div class="pr-score">${x.power.toFixed(1)}</div>
    </div>`;
  });

  h += '</div>';
  document.getElementById('tab-power').innerHTML = h;
}

// ══════════════════════════════════════════════
//  HEAD-TO-HEAD
// ══════════════════════════════════════════════
function renderH2H() {
  const src = activeSeason || allSeasons[0];
  if (!src) return;

  const schedule = (src.schedule||[]).filter(m => m.winner && m.winner !== 'UNDECIDED');
  const localMap = getTeamsMapFor(src);
  const ids = Object.keys(localMap).map(Number);

  const rec = {};
  ids.forEach(a => { rec[a] = {}; ids.forEach(b => { if(a!==b) rec[a][b]={w:0,l:0}; }); });

  schedule.forEach(m => {
    const h = m.home?.teamId, a = m.away?.teamId;
    if (!h||!a||!rec[h]||!rec[a]) return;
    if (m.winner==='HOME') { rec[h][a].w++; rec[a][h].l++; }
    else { rec[a][h].w++; rec[h][a].l++; }
  });

  const sorted = [...src.teams].sort((a,b) => ((b.record?.overall?.wins??0)-(a.record?.overall?.wins??0)));

  let h = `<div class="card">
    <div class="card-header">
      <div class="card-title">Head-to-Head Records</div>
      <div class="card-sub">${src.season} · Row's record vs column · Green = winning matchup</div>
    </div>
    <div class="h2h-wrap"><table class="h2h-tbl"><thead><tr><th class="rl">vs →</th>`;

  sorted.forEach(t => {
    const ab = tName(t).split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
    h += `<th title="${tName(t)}">${ab}</th>`;
  });
  h += '</tr></thead><tbody>';

  sorted.forEach(row => {
    h += `<tr><td class="rl">${tName(row)}</td>`;
    sorted.forEach(col => {
      if (row.id===col.id) { h += `<td class="h2h-self">—</td>`; return; }
      const r = rec[row.id]?.[col.id]||{w:0,l:0};
      if (r.w===0&&r.l===0) { h += `<td class="h2h-none">·</td>`; return; }
      const cls = r.w>r.l ? 'h2h-win' : 'h2h-loss';
      h += `<td class="${cls}">${r.w}–${r.l}</td>`;
    });
    h += '</tr>';
  });

  h += '</tbody></table></div></div>';
  document.getElementById('tab-h2h').innerHTML = h;
}

// ══════════════════════════════════════════════
//  SCORES
// ══════════════════════════════════════════════
function renderScores() {
  const src = activeSeason || allSeasons[0];
  if (!src) return;

  const localMap = getTeamsMapFor(src);
  const byWeek = {};
  (src.schedule||[]).forEach(m => {
    const wk = m.matchupPeriodId;
    if (!byWeek[wk]) byWeek[wk] = [];
    byWeek[wk].push(m);
  });

  const weeks = Object.keys(byWeek).map(Number).sort((a,b)=>b-a);
  let h = '<div class="card"><div class="card-header"><div class="card-title">Matchup Scores</div><div class="card-sub">All weeks · Most recent first</div></div>';
  let any = false;

  weeks.forEach(wk => {
    const done = byWeek[wk].filter(m => m.winner && m.winner !== 'UNDECIDED');
    if (!done.length) return;
    any = true;
    h += `<div class="wk-header">Week ${wk}</div>`;
    done.forEach(m => {
      const ht = localMap[m.home?.teamId], at = localMap[m.away?.teamId];
      if (!ht||!at) return;
      const hs = (m.home?.totalPoints??0).toFixed(2);
      const as_ = (m.away?.totalPoints??0).toFixed(2);
      const hw = m.winner==='HOME';
      h += `<div class="mu-row">
        <div class="mu-team ${hw?'w':'l'}">${tName(ht)}</div>
        <div class="mu-score ${hw?'w':'l'}">${hs}</div>
        <div class="mu-vs">vs</div>
        <div class="mu-score ${!hw?'w':'l'}">${as_}</div>
        <div class="mu-team r ${!hw?'w':'l'}">${tName(at)}</div>
      </div>`;
    });
  });

  if (!any) h += '<div class="empty-msg"><div class="eicon">🏈</div><p>No completed matchups yet. Check back once the season starts.</p></div>';
  h += '</div>';
  document.getElementById('tab-scores').innerHTML = h;
}

// ══════════════════════════════════════════════
//  AWARDS
// ══════════════════════════════════════════════
function renderAwards() {
  const src = activeSeason || allSeasons[0];
  if (!src) return;

  const teams = src.teams;
  const localMap = getTeamsMapFor(src);
  const sched = (src.schedule||[]).filter(m=>m.winner&&m.winner!=='UNDECIDED');

  let highScore=0, highTeam=null;
  let lowLoss=Infinity, lowLossTeam=null;
  let bigMargin=0, blowW=null, blowL=null;
  let closeMargin=Infinity, closeL=null, closeW=null;

  sched.forEach(m => {
    const ht=localMap[m.home?.teamId], at=localMap[m.away?.teamId];
    if(!ht||!at) return;
    const hs=m.home?.totalPoints??0, as_=m.away?.totalPoints??0;
    const hw=m.winner==='HOME';
    const margin=Math.abs(hs-as_);

    if(hs>highScore){highScore=hs;highTeam=ht;}
    if(as_>highScore){highScore=as_;highTeam=at;}
    const lScore=hw?as_:hs, lTeam=hw?at:ht;
    if(lScore<lowLoss&&lScore>0){lowLoss=lScore;lowLossTeam=lTeam;}
    if(margin>bigMargin){bigMargin=margin;blowW=hw?ht:at;blowL=hw?at:ht;}
    if(margin<closeMargin){closeMargin=margin;closeL=hw?at:ht;closeW=hw?ht:at;}
  });

  const byPF   = [...teams].sort((a,b)=>(b.points??0)-(a.points??0));
  const byPFA  = [...teams].sort((a,b)=>(a.points??0)-(b.points??0));
  const byW    = [...teams].sort((a,b)=>((b.record?.overall?.wins??0)-(a.record?.overall?.wins??0)));
  const byL    = [...teams].sort((a,b)=>((b.record?.overall?.losses??0)-(a.record?.overall?.losses??0)));
  const byPA   = [...teams].sort((a,b)=>(b.pointsAgainst??0)-(a.pointsAgainst??0));

  const N = t => t ? tName(t) : '—';

  const awards = [
    {emoji:'👑',color:'gold',   title:'The Juggernaut',        winner:N(byW[0]),     desc:`${byW[0]?.record?.overall?.wins??0}–${byW[0]?.record?.overall?.losses??0} record. Running the league.`},
    {emoji:'💣',color:'green',  title:'Points Machine',        winner:N(byPF[0]),    desc:`Most total points: ${(byPF[0]?.points??0).toFixed(1)} PF.`},
    {emoji:'🔥',color:'orange', title:'Single-Week Scorcher',  winner:N(highTeam),   desc:highTeam?`Season-high ${highScore.toFixed(2)} pts in a single week.`:'Not yet determined.'},
    {emoji:'💔',color:'red',    title:'Heartbreak Hotel',      winner:N(closeL),     desc:closeL?`Lost by ${closeMargin.toFixed(2)} pts to ${N(closeW)}. Devastating.`:'Not yet determined.'},
    {emoji:'🏟️',color:'purple', title:'The Blowout King',      winner:N(blowW),      desc:blowW?`Crushed ${N(blowL)} by ${bigMargin.toFixed(2)} pts. No mercy.`:'Not yet determined.'},
    {emoji:'🪨',color:'red',    title:'Turnstile Defense',     winner:N(byPA[0]),    desc:`Most points allowed: ${(byPA[0]?.pointsAgainst??0).toFixed(1)} PA.`},
    {emoji:'😬',color:'silver', title:'Glass Jaw',             winner:N(byL[0]),     desc:`${byL[0]?.record?.overall?.losses??0} losses. It's not over… right?`},
    {emoji:'⚰️',color:'red',    title:'Worst Loss Score',      winner:N(lowLossTeam),desc:lowLossTeam?`Put up ${lowLoss.toFixed(2)} pts and still lost.`:'Not yet determined.'},
    {emoji:'📉',color:'silver', title:'Fewest Points Scored',  winner:N(byPFA[0]),   desc:`Only ${(byPFA[0]?.points??0).toFixed(1)} PF this season.`},
  ];

  let h = `<div class="card"><div class="card-header"><div class="card-title">League Awards</div><div class="card-sub">${src.season} Season Superlatives</div></div><div class="awards-grid">`;
  awards.forEach(a => {
    h += `<div class="aw-card ${a.color}">
      <div class="aw-emoji">${a.emoji}</div>
      <div class="aw-title">${a.title}</div>
      <div class="aw-winner">${a.winner}</div>
      <div class="aw-desc">${a.desc}</div>
    </div>`;
  });
  h += '</div></div>';
  document.getElementById('tab-awards').innerHTML = h;
}

// ══════════════════════════════════════════════
//  HISTORY — HERO FEATURE
// ══════════════════════════════════════════════
function renderHistory() {
  if (!allSeasons.length) return;

  const tab = document.getElementById('tab-history');

  // Build cross-season stats table
  // Each row = one team across all seasons they appeared
  const crossStats = buildCrossSeasonStats();

  let h = `
  <!-- Hero header -->
  <div class="history-hero">
    <h2>League History</h2>
    <p>Every season, every matchup, every record — all in one place.</p>
    <div class="hist-controls">
      <div class="ctrl-group">
        <div class="ctrl-label">View</div>
        <select class="hist-sel" id="hist-view-sel" onchange="renderHistSub()">
          <option value="season-table">Season-by-Season Stats</option>
          <option value="alltime">All-Time Leaders</option>
          <option value="matchups">Matchup Browser</option>
          <option value="records">All-Time Records</option>
        </select>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Sort by</div>
        <select class="hist-sel" id="hist-sort-sel" onchange="renderHistSub()">
          <option value="wins">Wins</option>
          <option value="pf">Points For</option>
          <option value="ppg">PPG</option>
          <option value="winpct">Win %</option>
          <option value="pa">Points Against</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Summary stat cards -->
  ${buildSummaryCards(crossStats)}

  <!-- Sub-tab content -->
  <div class="card" id="hist-content">
    <div class="hist-tabs">
      <button class="hist-tab-btn active" onclick="histSubTab(event,'season-table')">By Season</button>
      <button class="hist-tab-btn" onclick="histSubTab(event,'alltime')">All-Time Leaders</button>
      <button class="hist-tab-btn" onclick="histSubTab(event,'matchups')">Matchup Browser</button>
      <button class="hist-tab-btn" onclick="histSubTab(event,'records')">Records</button>
    </div>
    <div id="hist-sub-season-table" class="hist-sub active"></div>
    <div id="hist-sub-alltime"      class="hist-sub"></div>
    <div id="hist-sub-matchups"     class="hist-sub"></div>
    <div id="hist-sub-records"      class="hist-sub"></div>
  </div>`;

  tab.innerHTML = h;

  renderHistSeasonTable(crossStats, 'wins');
  renderHistAllTime(crossStats);
  renderHistMatchups();
  renderHistRecords(crossStats);
}

function histSubTab(e, name) {
  document.querySelectorAll('.hist-sub').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.hist-tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('hist-sub-' + name).classList.add('active');
  e.target.classList.add('active');
}

function renderHistSub() {
  const view = document.getElementById('hist-view-sel')?.value || 'season-table';
  const sortBy = document.getElementById('hist-sort-sel')?.value || 'wins';
  const crossStats = buildCrossSeasonStats();
  if (view === 'season-table') renderHistSeasonTable(crossStats, sortBy);
  else if (view === 'alltime') renderHistAllTime(crossStats);
  else if (view === 'matchups') renderHistMatchups();
  else renderHistRecords(crossStats);
}

// Build per-team per-season stats
function buildCrossSeasonStats() {
  const rows = [];
  allSeasons.forEach(s => {
    const localMap = getTeamsMapFor(s);
    const sched = (s.schedule||[]).filter(m=>m.winner&&m.winner!=='UNDECIDED');

    // Who had the best record = champion candidate (most wins, then PF)
    const byW = [...s.teams].sort((a,b)=>{
      const dw = (b.record?.overall?.wins??0)-(a.record?.overall?.wins??0);
      if(dw!==0) return dw;
      return (b.points??0)-(a.points??0);
    });
    const champId = byW[0]?.id;

    s.teams.forEach(t => {
      const rec = t.record?.overall||{};
      const w = rec.wins??0, l = rec.losses??0, gp = w+l||1;
      const pf = t.points??0, pa = t.pointsAgainst??0;

      // High/low week for this team this season
      let weekHigh=0, weekLow=Infinity;
      sched.forEach(m => {
        const isHome = m.home?.teamId===t.id;
        const isAway = m.away?.teamId===t.id;
        if(!isHome&&!isAway) return;
        const pts = isHome ? (m.home?.totalPoints??0) : (m.away?.totalPoints??0);
        if(pts>weekHigh) weekHigh=pts;
        if(pts<weekLow) weekLow=pts;
      });

      rows.push({
        season: s.season,
        teamId: t.id,
        teamName: tName(t),
        owner: oName(t),
        wins: w, losses: l, gp,
        pf: pf, pa: pa,
        ppg: pf/gp,
        papg: pa/gp,
        winPct: w/gp,
        weekHigh,
        weekLow: weekLow===Infinity ? 0 : weekLow,
        isChamp: t.id === champId,
      });
    });
  });
  return rows;
}

function buildSummaryCards(rows) {
  const totalGames = rows.reduce((s,r)=>s+r.gp,0)/2;
  const totalPts   = rows.reduce((s,r)=>s+r.pf,0);
  const seasons    = allSeasons.length;
  const highScore  = rows.reduce((m,r)=>Math.max(m,r.weekHigh),0);
  const highOwner  = rows.find(r=>r.weekHigh===highScore);

  return `<div class="season-summary-row">
    <div class="sscard">
      <div class="sscard-label">Seasons Played</div>
      <div class="sscard-val">${seasons}</div>
      <div class="sscard-sub">${allSeasons.map(s=>s.season).join(', ')}</div>
    </div>
    <div class="sscard">
      <div class="sscard-label">Total Matchups</div>
      <div class="sscard-val">${Math.floor(totalGames)}</div>
      <div class="sscard-sub">across all seasons</div>
    </div>
    <div class="sscard">
      <div class="sscard-label">Total Points Scored</div>
      <div class="sscard-val">${(totalPts/1000).toFixed(1)}K</div>
      <div class="sscard-sub">league-wide</div>
    </div>
    <div class="sscard">
      <div class="sscard-label">All-Time High Score</div>
      <div class="sscard-val">${highScore.toFixed(0)}</div>
      <div class="sscard-sub">${highOwner ? highOwner.teamName + ' · ' + highOwner.season : '—'}</div>
    </div>
  </div>`;
}

function renderHistSeasonTable(rows, sortBy='wins') {
  const col = sortBy;
  const sorted = [...rows].sort((a,b) => {
    if(a.season !== b.season) return b.season - a.season;
    return (b[col]||0) - (a[col]||0);
  });

  let h = `<div class="hist-table-wrap"><table class="hist-table">
    <thead><tr>
      <th onclick="sortHistTable('season',this)">Season</th>
      <th>Team</th>
      <th onclick="sortHistTable('wins',this)">W–L</th>
      <th onclick="sortHistTable('winPct',this)">Win %</th>
      <th onclick="sortHistTable('pf',this)">PF</th>
      <th onclick="sortHistTable('pa',this)">PA</th>
      <th onclick="sortHistTable('ppg',this)">PPG</th>
      <th onclick="sortHistTable('weekHigh',this)">Week High</th>
      <th onclick="sortHistTable('weekLow',this)">Week Low</th>
      <th>Status</th>
    </tr></thead><tbody>`;

  let lastSeason = null;
  sorted.forEach(r => {
    const sepStyle = r.season !== lastSeason && lastSeason !== null
      ? 'border-top:2px solid var(--border-bright);'
      : '';

    const champBadge = r.isChamp
      ? `<span class="champ-crown">👑</span>`

      <td style="${sepStyle}">
        <div style="font-weight:600">${champBadge}${r.teamName}</div>

      </td>
      <td class="num" style="${sepStyle}">${r.wins}–${r.losses}</td>
      <td class="${r.winPct>=0.6?'green-val':r.winPct<0.4?'red-val':'num'}" style="${sepStyle}">${(r.winPct*100).toFixed(0)}%</td>
      <td class="green-val" style="${sepStyle}">${r.pf.toFixed(1)}</td>
      <td class="num" style="${sepStyle};color:var(--muted)">${r.pa.toFixed(1)}</td>
      <td class="gold-val" style="${sepStyle}">${r.ppg.toFixed(1)}</td>
      <td class="num" style="${sepStyle}">${r.weekHigh>0?r.weekHigh.toFixed(2):'—'}</td>
      <td class="num" style="${sepStyle};color:var(--muted)">${r.weekLow>0?r.weekLow.toFixed(2):'—'}</td>
      <td style="${sepStyle}">${r.isChamp?'<span class="streak streak-w">CHAMP</span>':''}</td>
    </tr>`;
  });

  h += '</tbody></table></div>';
  document.getElementById('hist-sub-season-table').innerHTML = h;

let histSortCol = 'season', histSortDir = -1;
function sortHistTable(col, el) {
  if(histSortCol===col) histSortDir *= -1;
  else { histSortCol = col; histSortDir = -1; }
  document.querySelectorAll('.hist-table th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
  });
  el.classList.add(histSortDir===-1?'sort-desc':'sort-asc');
  const rows = buildCrossSeasonStats();
  const sorted = [...rows].sort((a,b) => {
    if(col==='season') return (b.season-a.season)*histSortDir*-1;
    return ((b[col]||0)-(a[col]||0))*histSortDir*-1;
  });
  renderHistSeasonTableFrom(sorted);
}

function renderHistAllTime(rows) {
  // Aggregate by owner name (handle same owner across seasons)
  const byOwner = {};
  rows.forEach(r => {
    const key = r.owner || r.teamName;
    if (!byOwner[key]) byOwner[key] = { owner:key, seasons:0, wins:0, losses:0, pf:0, pa:0, weekHighAll:0, champs:0 };
    const o = byOwner[key];
    o.seasons++;
    o.wins   += r.wins;
    o.losses += r.losses;
    o.pf     += r.pf;
    o.pa     += r.pa;
    if(r.weekHigh > o.weekHighAll) o.weekHighAll = r.weekHigh;
    if(r.isChamp) o.champs++;
  });

  const owners = Object.values(byOwner);
  const gp = o => o.wins+o.losses||1;

  const leaders = [
    { cat:'Most Wins (All-Time)', fmt: o=>`${o.wins} W`, topFn: o=>o.wins, detFn: o=>`across ${o.seasons} season${o.seasons>1?'s':''}` },
    { cat:'Best Win %',           fmt: o=>`${(o.wins/gp(o)*100).toFixed(0)}%`, topFn: o=>o.wins/gp(o), detFn: o=>`${o.wins}–${o.losses}` },
    { cat:'Most Points For',      fmt: o=>`${o.pf.toFixed(0)}`, topFn: o=>o.pf, detFn: o=>`${(o.pf/gp(o)).toFixed(1)} PPG avg` },
    { cat:'Highest Single Week',  fmt: o=>`${o.weekHighAll.toFixed(2)}`, topFn: o=>o.weekHighAll, detFn: o=>`personal best` },
    { cat:'Most Championships',   fmt: o=>`${o.champs} 👑`, topFn: o=>o.champs, detFn: o=>`${o.seasons} season${o.seasons>1?'s':''} played` },
    { cat:'Most Seasons Played',  fmt: o=>`${o.seasons}`, topFn: o=>o.seasons, detFn: o=>`${o.wins}–${o.losses} record` },
    { cat:'Most Points Against',  fmt: o=>`${o.pa.toFixed(0)} PA`, topFn: o=>o.pa, detFn: o=>`unlucky or just bad D?` },
    { cat:'Most Total Losses',    fmt: o=>`${o.losses} L`, topFn: o=>o.losses, detFn: o=>`${o.seasons} season${o.seasons>1?'s':''} of pain` },
  ];

  let h = '<div class="leaders-grid">';
  leaders.forEach(l => {
    const sorted = [...owners].sort((a,b)=>l.topFn(b)-l.topFn(a));
    const top = sorted[0];
    if(!top) return;
    h += `<div class="leader-card">
      <div class="leader-cat">${l.cat}</div>
      <div class="leader-name">${top.owner}</div>
      <div class="leader-val">${l.fmt(top)}</div>
      <div class="leader-detail">${l.detFn(top)}</div>
    </div>`;
  });
  h += '</div>';
  document.getElementById('hist-sub-alltime').innerHTML = h;
}

function renderHistMatchups() {
  // Searchable/filterable matchup browser across all seasons
  const allMatchups = [];
  allSeasons.forEach(s => {
    const localMap = getTeamsMapFor(s);
    (s.schedule||[])
      .filter(m => m.winner && m.winner!=='UNDECIDED')
      .forEach(m => {
        const ht=localMap[m.home?.teamId], at=localMap[m.away?.teamId];
        if(!ht||!at) return;
        allMatchups.push({
          season: s.season,
          week: m.matchupPeriodId,
          homeTeam: tName(ht), awayTeam: tName(at),
          homeScore: m.home?.totalPoints??0,
          awayScore: m.away?.totalPoints??0,
          winner: m.winner==='HOME' ? tName(ht) : tName(at),
          margin: Math.abs((m.home?.totalPoints??0)-(m.away?.totalPoints??0)),
        });
      });
  });

  allMatchups.sort((a,b) => b.season-a.season || b.week-a.week);

  // Build team list for filter
  const teams = [...new Set(allMatchups.flatMap(m=>[m.homeTeam,m.awayTeam]))].sort();

  let h = `<div class="mu-browser-controls">
    <div class="ctrl-group">
      <div class="ctrl-label">Filter Team</div>
      <select class="hist-sel" id="mu-team-filter" onchange="filterMatchups()">
        <option value="">All Teams</option>
        ${teams.map(t=>`<option value="${t}">${t}</option>`).join('')}
      </select>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Season</div>
      <select class="hist-sel" id="mu-season-filter" onchange="filterMatchups()">
        <option value="">All Seasons</option>
        ${allSeasons.map(s=>`<option value="${s.season}">${s.season}</option>`).join('')}
      </select>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Sort by</div>
      <select class="hist-sel" id="mu-sort-filter" onchange="filterMatchups()">
        <option value="date">Most Recent</option>
        <option value="margin-desc">Biggest Blowout</option>
        <option value="margin-asc">Closest Game</option>
        <option value="score-desc">Highest Score</option>
      </select>
    </div>
  </div>
  <div id="mu-results"></div>`;

  document.getElementById('hist-sub-matchups').innerHTML = h;

  // Store matchups globally for filter function
  window._allMatchups = allMatchups;
  filterMatchups();
}

function filterMatchups() {
  const teamF   = document.getElementById('mu-team-filter')?.value || '';
  const seasonF = document.getElementById('mu-season-filter')?.value || '';
  const sortF   = document.getElementById('mu-sort-filter')?.value || 'date';

  let results = [...(window._allMatchups||[])];

  if(teamF) results = results.filter(m => m.homeTeam===teamF||m.awayTeam===teamF);
  if(seasonF) results = results.filter(m => String(m.season)===seasonF);

  if(sortF==='margin-desc') results.sort((a,b)=>b.margin-a.margin);
  else if(sortF==='margin-asc') results.sort((a,b)=>a.margin-b.margin);
  else if(sortF==='score-desc') results.sort((a,b)=>Math.max(b.homeScore,b.awayScore)-Math.max(a.homeScore,a.awayScore));
  else results.sort((a,b)=>b.season-a.season||b.week-a.week);

  const el = document.getElementById('mu-results');
  if(!el) return;

  if(!results.length) {
    el.innerHTML = '<div class="empty-msg"><div class="eicon">🔍</div><p>No matchups match your filters.</p></div>';
    return;
  }

  let h = '';
  let lastSeason = null;
  results.forEach(m => {
    if(m.season!==lastSeason) {
      h += `<div class="wk-header">${m.season} Season</div>`;
      lastSeason=m.season;
    }
    const hw = m.winner===m.homeTeam;
    h += `<div class="mu-row">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);width:52px;flex-shrink:0">WK ${m.week}</div>
      <div class="mu-team ${hw?'w':'l'}">${m.homeTeam}</div>
      <div class="mu-score ${hw?'w':'l'}">${m.homeScore.toFixed(2)}</div>
      <div class="mu-vs">vs</div>
      <div class="mu-score ${!hw?'w':'l'}">${m.awayScore.toFixed(2)}</div>
      <div class="mu-team r ${!hw?'w':'l'}">${m.awayTeam}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);width:52px;text-align:right;flex-shrink:0">Δ${m.margin.toFixed(1)}</div>
    </div>`;
  });
  el.innerHTML = h;
}

function renderHistRecords(rows) {
  // Fun season/all-time records
  const mostPFSeason  = [...rows].sort((a,b)=>b.pf-a.pf)[0];
  const leastPFSeason = [...rows].sort((a,b)=>a.pf-b.pf)[0];

  const worstWinPct   = [...rows].sort((a,b)=>a.winPct-b.winPct)[0];
  const highWeek      = [...rows].sort((a,b)=>b.weekHigh-a.weekHigh)[0];
  const lowWeek       = [...rows].filter(r=>r.weekLow>0).sort((a,b)=>a.weekLow-b.weekLow)[0];
  const mostWinsSzn   = [...rows].sort((a,b)=>b.wins-a.wins)[0];
  const mostLossSzn   = [...rows].sort((a,b)=>b.losses-a.losses)[0];

  const R = (r, val, desc) => !r ? '' : `
    <tr>
      <td>${desc}</td>

      <td class="gold-val">${val}</td>
      <td style="color:var(--muted);font-size:12px">${r.owner}</td>

      <th>Record</th>
      <th>Team</th>
      <th>Season</th>
      <th>Value</th>
      <th>Owner</th>
    </tr></thead><tbody>
    ${R(mostPFSeason,  mostPFSeason?.pf.toFixed(1)+' PF',       '📈 Most Points in a Season')}
    ${R(leastPFSeason, leastPFSeason?.pf.toFixed(1)+' PF',      '📉 Fewest Points in a Season')}
    ${R(bestWinPct,    (bestWinPct?.winPct*100).toFixed(0)+'%',  '🏆 Best Win % in a Season')}
    ${R(worstWinPct,   (worstWinPct?.winPct*100).toFixed(0)+'%', '💀 Worst Win % in a Season')}
    ${R(highWeek,      highWeek?.weekHigh.toFixed(2)+' pts',     '🔥 Highest Single-Week Score')}
    ${R(lowWeek,       lowWeek?.weekLow.toFixed(2)+' pts',       '🧊 Lowest Single-Week Score')}
    ${R(mostWinsSzn,   mostWinsSzn?.wins+' wins',               '👑 Most Wins in a Season')}
    ${R(mostLossSzn,   mostLossSzn?.losses+' losses',           '😬 Most Losses in a Season')}
    </tbody></table></div>`;

  document.getElementById('hist-sub-records').innerHTML = h;
}

    return;
  }

  // Build team map across all seasons
  const getMap = (s) => { const m={}; s.teams.forEach(t=>m[t.id]=t); return m; };

    </div>

function posClass(pos) {
  const p = (pos||'').toUpperCase();
  if(p==='QB') return 'pos-qb';
  if(p==='RB') return 'pos-rb';
  if(p==='WR') return 'pos-wr';
  if(p==='TE') return 'pos-te';
  if(p==='K')  return 'pos-k';
  return 'pos-dst';
}

function renderDraftSeason() {
  const seasonVal = parseInt(document.getElementById('draft-season-sel')?.value);
  const view      = document.getElementById('draft-view-sel')?.value || 'picks';
  const posFilter = document.getElementById('draft-pos-sel')?.value  || '';

  const seasonObj = (window._drafts||[]).find(s => s.season === seasonVal);
  if (!seasonObj) return;

  const picks     = seasonObj.draftDetail?.picks || [];
  const localMap  = window._draftSeasonMaps?.[seasonVal] || {};
  const totalTeams = seasonObj.teams?.length || 10;

  // Enrich picks
  const enriched = picks.map(p => {
    const owner = localMap[p.teamId];
    return {
      ...p,
      ownerName: owner ? tName(owner) : `Team ${p.teamId}`,
      round: Math.ceil(p.overallPickNumber / totalTeams),
      pickInRound: ((p.overallPickNumber - 1) % totalTeams) + 1,
    };
  });

  // Apply position filter
  const filtered = posFilter
    ? enriched.filter(p => (p.playerPoolEntry?.onTeamId !== undefined) &&
        getPlayerPos(p) === posFilter)
    : enriched;

  const el = document.getElementById('draft-content');
  if (!el) return;

  if (view === 'picks')    { el.innerHTML = renderPicksList(filtered, posFilter); }
  else if (view === 'board')    { el.innerHTML = renderDraftBoard(enriched, totalTeams, localMap); }
  else if (view === 'by-team')  { el.innerHTML = renderByTeam(enriched, localMap); }
  else if (view === 'by-position') { el.innerHTML = renderByPosition(enriched); }
}

function getPlayerName(p) {
  return p.playerPoolEntry?.player?.fullName
      || p.playerPoolEntry?.player?.lastName
      || `Pick #${p.overallPickNumber}`;
}

function getPlayerPos(p) {
  const posMap = {0:'QB',2:'CB',3:'S',4:'LB',5:'DL',6:'K',7:'P',16:'D/ST',
    23:'WR',1:'WR',10:'RB',11:'RB',22:'TE'};
  const id = p.playerPoolEntry?.player?.defaultPositionId;
  // Try the lineup slot first, then defaultPositionId
  return p.playerPoolEntry?.player?.eligibleSlots?.[0] === 16 ? 'D/ST'
       : posMap[id] || 'FLEX';
}

function getPlayerNFLTeam(p) {
  const teams = {1:'ATL',2:'BUF',3:'CHI',4:'CIN',5:'CLE',6:'DAL',7:'DEN',8:'DET',
    9:'GB',10:'TEN',11:'IND',12:'KC',13:'OAK',14:'LAR',15:'MIA',16:'MIN',17:'NE',
    18:'NO',19:'NYG',20:'NYJ',21:'PHI',22:'ARI',23:'PIT',24:'LAC',25:'SF',26:'SEA',
    27:'TB',28:'WAS',29:'CAR',30:'JAC',33:'BAL',34:'HOU',0:'FA'};
  return teams[p.playerPoolEntry?.player?.proTeamId] || '';
}

function renderPicksList(picks, posFilter) {
  if (!picks.length) return '<div class="empty-msg"><p>No picks match this filter.</p></div>';
  let h = '';
  let lastRound = 0;
  picks.forEach(p => {
    if (p.round !== lastRound) {
      h += `<div class="round-divider">Round ${p.round}</div>`;
      lastRound = p.round;
    }
    const pos = getPlayerPos(p);
    const pc  = posClass(pos);
    const earlyClass = p.overallPickNumber <= 10 ? 'early' : p.overallPickNumber <= 30 ? 'mid' : '';
    h += `<div class="mu-row">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);width:44px;flex-shrink:0">#${p.overallPickNumber}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;width:30px;flex-shrink:0;color:var(--muted)">${p.pickInRound}.</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px">${getPlayerName(p)}</div>
        <div style="font-size:11px;color:var(--muted)">${getPlayerNFLTeam(p)} · <span class="${pc}">${pos}</span></div>
      </div>
      <div style="font-size:12px;color:var(--gold);font-weight:600;text-align:right">${p.ownerName}</div>
    </div>`;
  });
  return h;
}

function renderDraftBoard(picks, totalTeams, localMap) {
  // Build grid: rows = rounds, cols = teams (in draft order)
  const rounds = Math.ceil(picks.length / totalTeams);
  const teamOrder = []; // first-round pick order

  // Get teams in order of their first pick
  const firstPicks = picks.filter(p => p.round === 1).sort((a,b)=>a.overallPickNumber-b.overallPickNumber);
  firstPicks.forEach(p => { if(!teamOrder.includes(p.teamId)) teamOrder.push(p.teamId); });

  // Add any teams that didn't pick in round 1
  Object.keys(localMap).forEach(id => {
    if(!teamOrder.includes(parseInt(id))) teamOrder.push(parseInt(id));
  });

  let h = '<div class="draft-board-wrap"><table class="draft-board"><thead><tr><th>Rd</th>';
  teamOrder.forEach(id => {
    const t = localMap[id];
    h += `<th>${t ? tName(t).split(' ').slice(-1)[0] : id}</th>`;
  });
  h += '</tr></thead><tbody>';

  for (let r = 1; r <= rounds; r++) {
    h += `<tr><td>${r}</td>`;
    // Snake draft: even rounds reverse order
    const colOrder = r % 2 === 0 ? [...teamOrder].reverse() : teamOrder;
    teamOrder.forEach(teamId => {
      const pick = picks.find(p => p.round === r && p.teamId === teamId);
      if (!pick) { h += '<td></td>'; return; }
      const pos = getPlayerPos(pick);
      h += `<td>
        <div class="db-player">${getPlayerName(pick)}</div>
        <div class="db-pos ${posClass(pos)}">${pos}</div>
        <div class="db-team">${getPlayerNFLTeam(pick)}</div>
      </td>`;
    });
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  return h;
}

function renderByTeam(picks, localMap) {
  const byTeam = {};
  picks.forEach(p => {
    if(!byTeam[p.teamId]) byTeam[p.teamId] = [];
    byTeam[p.teamId].push(p);
  });
  let h = '<div style="padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">';
  Object.keys(byTeam).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(teamId => {
    const t = localMap[teamId];
    const tpicks = byTeam[teamId].sort((a,b)=>a.overallPickNumber-b.overallPickNumber);
    h += `<div class="card" style="margin-bottom:0">
      <div class="card-header" style="padding:10px 14px">
        <div class="card-title" style="font-size:14px">${t ? tName(t) : 'Team '+teamId}</div>
        <div class="card-sub">${tpicks.length} picks</div>
      </div>`;
    tpicks.forEach(p => {
      const pos = getPlayerPos(p);
      h += `<div style="padding:7px 14px;border-bottom:1px solid rgba(27,51,36,0.4);display:flex;gap:8px;align-items:center">
        <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);width:28px">#${p.overallPickNumber}</span>
        <span class="${posClass(pos)}" style="font-size:10px;font-weight:600;width:30px">${pos}</span>
        <span style="font-size:12px;font-weight:600;flex:1">${getPlayerName(p)}</span>
      </div>`;
    });
    h += '</div>';
  });
  return h + '</div>';
}

function renderByPosition(picks) {
  const positions = ['QB','RB','WR','TE','K','D/ST','FLEX'];
  const byPos = {};
  positions.forEach(p => byPos[p] = []);
  picks.forEach(p => {
    const pos = getPlayerPos(p);
    if(byPos[pos]) byPos[pos].push(p);
    else byPos['FLEX'] = (byPos['FLEX']||[]).concat([p]);
  });
  let h = '';
  positions.forEach(pos => {
    const group = byPos[pos]||[];
    if(!group.length) return;
    h += `<div class="wk-header"><span class="${posClass(pos)}">${pos}</span> — ${group.length} picks</div>`;
    group.sort((a,b)=>a.overallPickNumber-b.overallPickNumber).forEach(p => {
      h += `<div class="mu-row">
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);width:44px;flex-shrink:0">#${p.overallPickNumber}</div>
        <div style="flex:1;font-weight:600;font-size:13px">${getPlayerName(p)}</div>
        <div style="font-size:11px;color:var(--muted);margin:0 12px">${getPlayerNFLTeam(p)}</div>
        <div style="font-size:12px;color:var(--gold);font-weight:600">${p.ownerName}</div>
      </div>`;
    });
  });
  return h;
}
